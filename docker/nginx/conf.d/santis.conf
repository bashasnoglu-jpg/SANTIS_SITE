# ─── Wildcard: *.santis.app ──────────────────────────────────────────────────
# Tüm subdomain'ler (hotel1.santis.app, spa2.santis.app...) bu bloğa düşer
server {
    listen 443 ssl http2;
    server_name *.santis.app;

    # Let's Encrypt Wildcard SSL (certbot ile otomatik alınır)
    ssl_certificate     /etc/letsencrypt/live/santis.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/santis.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Tenant subdomain'ini API'ye ilet
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Auth rate limit (brute-force koruması)
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # WebSocket
    location /ws {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # Static assets cache
    location /assets/ {
        proxy_pass       http://api:8000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Frontend (her şey + SPA fallback)
    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}

# ─── Ana domain: santis.app ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name santis.app www.santis.app;

    ssl_certificate     /etc/letsencrypt/live/santis.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/santis.app/privkey.pem;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ─── HTTP → HTTPS 301 ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name *.santis.app santis.app www.santis.app;
    return 301 https://$host$request_uri;
}

# ─── Certbot ACME challenge ──────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
