<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Sovereign Rail Physics Test Lab — Santis Club Spa & Wellness Antalya. Lüks hamam, masaj ve cilt bakımı deneyimleri Konyaaltı'nda.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Rail Physics Test Lab</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #0a0a09; color: #d1cbc1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* Dikey scroll kapalı */
        }
        
        /* THE QUANTUM VOID (Arka Plan WebGL Temsili) */
        #santis-quantum-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, #1a1a19 0%, #050505 100%);
        }

        /* TELEMETRY HUD */
        #hud {
            position: fixed; top: 20px; left: 20px;
            background: rgba(10, 10, 9, 0.8); border: 1px solid rgba(179, 155, 89, 0.3);
            backdrop-filter: blur(10px); padding: 15px; border-radius: 8px;
            font-family: monospace; font-size: 13px; z-index: 100;
        }
        .hud-label { color: #888; display: inline-block; width: 100px; }
        .hud-val { color: #b39b59; font-weight: bold; }

        /* SİSTEM KONTEYNERİ */
        .rail-viewport {
            width: 100vw; height: 100vh;
            display: flex; align-items: center;
            overflow: hidden; /* Sadece js ile kaydıracağız */
        }

        /* RAY */
        .rail-track {
            display: flex; gap: 40px;
            padding-left: calc(50vw - 150px); /* İlk kartı merkeze oturtmak için */
            padding-right: calc(50vw - 150px);
            will-change: transform;
            cursor: grab;
        }

        /* KARTLAR */
        .luxury-card {
            min-width: 300px; height: 450px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.4s ease, border-color 0.4s ease;
            user-select: none;
        }
        
        .luxury-card h2 { margin:0; font-weight: 300; letter-spacing: 2px; }
        .luxury-card p { color: #888; font-size: 0.9rem; margin-top: 10px; }
        
        .luxury-card:hover {
            transform: translateY(-10px);
            border-color: rgba(179, 155, 89, 0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <!-- KATMAN 1: Tuval -->
    <div id="santis-quantum-canvas"></div>

    <!-- KATMAN 2: Gösterge Paneli -->
    <div id="hud">
        <div style="color:#fff; margin-bottom: 10px; font-weight:bold; letter-spacing:1px;">SOVEREIGN KINETICS</div>
        <div><span class="hud-label">State:</span> <span class="hud-val" id="hud-state">IDLE</span></div>
        <div><span class="hud-label">Velocity:</span> <span class="hud-val" id="hud-velocity">0.000</span> px/ms</div>
        <div><span class="hud-label">Current X:</span> <span class="hud-val" id="hud-current">0.0</span> px</div>
        <div><span class="hud-label">Target X:</span> <span class="hud-val" id="hud-target">0.0</span> px</div>
        <div><span class="hud-label">Distance:</span> <span class="hud-val" id="hud-distance">0.0</span> px</div>
    </div>

    <!-- KATMAN 3: Ray ve Kartlar -->
    <main class="rail-viewport">
        <div class="rail-track" id="main-rail">
            <div class="luxury-card"><h2>ASIAN BLISS</h2><p>Bali Masajı</p></div>
            <div class="luxury-card"><h2>DEEP TISSUE</h2><p>Sporcu Masajı</p></div>
            <div class="luxury-card"><h2>HOT STONE</h2><p>Volkanik Taş</p></div>
            <div class="luxury-card"><h2>GOLD MASK</h2><p>24K Anti-Aging</p></div>
            <div class="luxury-card"><h2>GLASS SKIN</h2><p>Kore Cilt Bakımı</p></div>
            <div class="luxury-card"><h2>SIGNATURE</h2><p>Santis VIP Ritüeli</p></div>
        </div>
    </main>

    <!-- MOTOR ATEŞLEYİCİ -->
    <script type="module">
        import { SovereignRail } from './assets/js/santis-rail.js';

        document.addEventListener('DOMContentLoaded', () => {
            const rail = new SovereignRail('#main-rail');
            
            // Telemetry Bağlantısı
            const hudState = document.getElementById('hud-state');
            const hudVel = document.getElementById('hud-velocity');
            const hudCurr = document.getElementById('hud-current');
            const hudTarget = document.getElementById('hud-target');
            const hudDist = document.getElementById('hud-distance');

            rail.onTelemetryUpdate = (data) => {
                hudState.innerText = data.state;
                hudVel.innerText = data.velocity;
                hudCurr.innerText = data.currentX;
                hudTarget.innerText = data.targetX;
                hudDist.innerText = data.distance;
                
                // State Rengi
                if (data.state === 'DRAGGING') hudState.style.color = '#fff';
                else if (data.state === 'SNAP_ENGINE_ACTIVE') hudState.style.color = '#b39b59';
                else hudState.style.color = '#555';
            };
        });
    </script>
</body>
</html>
