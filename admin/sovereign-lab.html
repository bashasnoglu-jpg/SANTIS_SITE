<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="SANTIS SOVEREIGN LAB v12.2 | Pulse & Flow — Santis Club Spa & Wellness Antalya. Lüks hamam, masaj ve cilt bakımı deneyimleri Konyaaltı'nda.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTIS SOVEREIGN LAB v12.2 | Pulse & Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS
           ═══════════════════════════════════════════ */
        :root {
            --mint: #00FFC2;
            --cyber: #00D1FF;
            --gold: #D4AF37;
            --red: #FF3B30;
            --bg-deep: #050607;
            --bg-card: #0e1013;
            --bg-surface: #141618;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-dim: rgba(255, 255, 255, 0.35);
            --text-mid: rgba(255, 255, 255, 0.6);
        }

        /* ═══════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 1fr 70px;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* ═══════════════════════════════════════════
           SIDEBAR — DIAGNOSTICS & CONTROLS
           ═══════════════════════════════════════════ */
        #sidebar {
            grid-row: 1 / 3;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: 28px 22px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: -0.5px;
        }
        .sidebar-header h1 span {
            color: var(--mint);
            font-weight: 600;
        }
        .sidebar-header .version {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Diagnostics Cards */
        .diag-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .diag-card .diag-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--mint);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .diag-card .diag-label .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--mint);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--mint); }
            50% { opacity: 0.4; box-shadow: 0 0 8px var(--mint); }
        }

        .diag-value {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .diag-value .num {
            font-size: 28px;
            font-weight: 700;
            color: var(--mint);
            line-height: 1;
        }

        /* Controls */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-group label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-mid);
        }
        .control-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: var(--mint);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--mint);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--mint);
            color: var(--mint);
            padding: 11px 16px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--mint);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 194, 0.3);
        }
        .btn.btn-danger {
            border-color: var(--red);
            color: var(--red);
        }
        .btn.btn-danger:hover {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 59, 48, 0.3);
        }

        /* Event Log */
        .event-log {
            flex: 1;
            min-height: 100px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .event-entry {
            font-family: monospace;
            font-size: 10px;
            padding: 6px 10px;
            background: rgba(0, 255, 194, 0.04);
            border-left: 2px solid var(--mint);
            border-radius: 0 4px 4px 0;
            color: var(--text-mid);
            animation: slide-in 0.3s ease-out;
        }
        .event-entry .ev-id { color: var(--mint); font-weight: 600; }
        .event-entry .ev-score { color: var(--gold); }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ═══════════════════════════════════════════
           GRID — NUCLEAR CARDS
           ═══════════════════════════════════════════ */
        #grid-zone {
            overflow-y: auto;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 28px;
            align-content: start;
            scroll-behavior: smooth;
            background: radial-gradient(circle at 50% 0%, rgba(0, 255, 194, 0.02) 0%, transparent 60%);
        }

        /* Nuclear Card */
        .santis-ncard {
            position: relative;
            height: 320px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            /* Initial state: dormant */
            opacity: 0.2;
            transform: translateY(30px) scale(0.96);
            transition: opacity 1s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .santis-ncard.awakened {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .santis-ncard:hover {
            border-color: rgba(0, 255, 194, 0.2);
        }

        /* Plazma Glow Ring */
        .santis-glow-ring {
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: conic-gradient(from 0deg, transparent 0%, var(--mint) 25%, var(--cyber) 50%, transparent 75%);
            animation: santis-rotate 3.5s linear infinite;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .santis-ncard.awakened .santis-glow-ring {
            opacity: var(--glow-intensity, 0.15);
        }
        @keyframes santis-rotate {
            100% { transform: rotate(360deg); }
        }

        .santis-ncard .card-inner {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .card-icon {
            font-size: 36px;
            margin-bottom: 8px;
            filter: grayscale(1);
            transition: filter 0.8s ease;
        }
        .santis-ncard.awakened .card-icon { filter: grayscale(0); }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .card-score {
            font-size: 12px;
            font-weight: 500;
            color: var(--mint);
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
        }
        .santis-ncard.awakened .card-score { opacity: 1; }

        .card-category {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Selected state */
        .santis-ncard.selected {
            border-color: var(--gold) !important;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }

        /* ═══════════════════════════════════════════
           PULSE BAR — BOTTOM
           ═══════════════════════════════════════════ */
        #pulse-bar {
            grid-column: 2 / 3;
            background: linear-gradient(to top, rgba(0, 255, 194, 0.03), transparent);
            border-top: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }
        #pulse-bar .pulse-label {
            position: absolute;
            top: 8px;
            left: 16px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
        }
        #pulse-canvas {
            width: 100%;
            height: 100%;
        }

        /* ═══════════════════════════════════════════
           TELEMETRY BADGE
           ═══════════════════════════════════════════ */
        .telemetry-badge {
            position: fixed;
            top: 12px;
            right: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 14px;
            display: flex;
            gap: 16px;
            z-index: 100;
            font-family: monospace;
            font-size: 11px;
        }
        .tel-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .tel-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .tel-value { font-weight: 700; }
        .tel-green { color: #50C878; }
        .tel-gold { color: var(--gold); }
    </style>
</head>
<body>

        <!-- Event Log -->
        <div class="diag-card" style="flex:1; display:flex; flex-direction:column;">

    <!-- ═══════ GRID ZONE ═══════ -->

    <!-- ═══════ PULSE BAR ═══════ -->

    <!-- ═══════ TELEMETRY ═══════ -->
    <div class="telemetry-badge">

    <!-- ═══════ OBSERVER MODULE ═══════ -->
    <script src="../assets/js/core/santis-observer.js"></script>

    <script>
    (function() {
        "use strict";

        // ─── DATA: 12 Test Entities ─────────────────────────────
        const ENTITIES = [
            { id: "HAMAM-001",   icon: "🏛️", name: "Osmanlı Ritueli",       score: 4.8, cat: "Hamam" },
            { id: "HAMAM-002",   icon: "💎", name: "Santis Paşa VIP",       score: 5.0, cat: "Hamam" },
            { id: "HAMAM-003",   icon: "🧂", name: "Tuz Peeling",           score: 3.2, cat: "Hamam" },
            { id: "MASAJ-001",   icon: "💆", name: "Aromaterapi Masajı",    score: 3.9, cat: "Masaj" },
            { id: "MASAJ-002",   icon: "🔥", name: "Sıcak Taş Terapisi",   score: 4.5, cat: "Masaj" },
            { id: "MASAJ-003",   icon: "🥋", name: "Thai Masajı",           score: 3.6, cat: "Masaj" },
            { id: "CILT-001",    icon: "✨", name: "Gold Mask Ritual",      score: 4.7, cat: "Cilt" },
            { id: "CILT-002",    icon: "💧", name: "Hyaluron Hydrate",      score: 3.4, cat: "Cilt" },
            { id: "CILT-003",    icon: "🌿", name: "Glass Skin",            score: 4.1, cat: "Cilt" },
            { id: "VIP-001",     icon: "👑", name: "Sovereign Suite",       score: 5.0, cat: "VIP" },
            { id: "SIGNATURE-1", icon: "🦅", name: "Signature Ritüel",     score: 4.9, cat: "Signature" },
            { id: "DETOX-001",   icon: "🌊", name: "Deep Sea Detox",       score: 3.8, cat: "Wellness" },
        ];

        // ─── GRID BUILDER ───────────────────────────────────────
        const grid = document.getElementById("grid-zone");

        ENTITIES.forEach(ent => {
            const card = document.createElement("div");
            card.className = "santis-ncard";
            card.dataset.id = ent.id;
            card.dataset.score = ent.score;
            card.dataset.type = ent.cat;

            card.innerHTML = `
                <div class="santis-glow-ring"></div>
                <div class="card-inner">
                    <div class="card-icon">${ent.icon}</div>
                    <div class="card-name">${ent.name}</div>
                    <div class="card-score">Score: ${ent.score}</div>
                    <div class="card-category">${ent.cat}</div>
                </div>
            `;

            // Click → Focus
            card.addEventListener("click", () => selectCard(card, ent));
            grid.appendChild(card);
        });

        // ─── CARD SELECTION (VIP Focus) ─────────────────────────
        let _selectedCard = null;

        function selectCard(cardEl, ent) {
            // Deselect previous
            if (_selectedCard) _selectedCard.classList.remove("selected");

            cardEl.classList.add("selected");
            _selectedCard = cardEl;

            // Update Focus Panel
            const focusPanel = document.getElementById("focus-card");
            focusPanel.style.display = "block";
            document.getElementById("focus-name").textContent = ent.name;
            document.getElementById("focus-score").textContent = `Score: ${ent.score} / 5.0`;
            document.getElementById("focus-category").textContent = ent.cat.toUpperCase();

            // Trigger pulse on selection
            triggerPulse(true);
            logEvent(`FOCUS → ${ent.id} (${ent.score})`);
        }

        // ─── PULSE ENGINE ───────────────────────────────────────
        const canvas = document.getElementById("pulse-canvas");
        const ctx = canvas.getContext("2d");
        const POINT_COUNT = 150;
        let points = new Float32Array(POINT_COUNT).fill(35);
        let boost = 0;

        // Canvas sizing — ONLY on resize (bugfix from prototype)
        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Global pulse trigger
        window.triggerPulse = function(isBig) {
            boost = isBig ? 40 : 12;
        };

        window.forcePulse = function() {
            window.triggerPulse(true);
            logEvent("⚡ FORCE PULSE fired");
        };

        function drawPulse() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Glow
            ctx.strokeStyle = "rgba(0, 255, 194, 0.8)";
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#00FFC2";

            ctx.beginPath();
            const step = canvas.width / (POINT_COUNT - 1);
            const mid = canvas.height * 0.55;

            for (let i = 0; i < POINT_COUNT; i++) {
                const noise = (Math.random() - 0.5) * 3;
                const boostVal = i === POINT_COUNT - 1 ? boost : 0;
                points[i] = i < POINT_COUNT - 1 ? points[i + 1] : mid + noise + boostVal;

                const x = i * step;
                const y = points[i];
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Decay
            if (boost > 0.5) boost *= 0.91;
            else boost = 0;

            requestAnimationFrame(drawPulse);
        }
        drawPulse();

        // ─── OBSERVER INIT ──────────────────────────────────────
        function initObserver() {
            const threshold = parseFloat(document.getElementById("threshold-slider").value);

            SantisObserver.init(threshold, (id, el, score) => {
                // Awaken the card
                el.classList.add("awakened");

                // Set glow intensity based on score (1-5 → 0.1-0.6)
                const intensity = 0.1 + ((score - 1) / 4) * 0.5;
                el.style.setProperty("--glow-intensity", intensity.toFixed(2));

                // Log
                logEvent(`✨ DISCOVERED: ${id} (Score ${score})`);

                // Update diagnostics
                updateDiagnostics();
            });

            // Observe all cards
            const count = SantisObserver.observeAll(".santis-ncard");
            logEvent(`👁️ Observer armed — ${count} targets, threshold=${threshold}`);
        }
        initObserver();

        // ─── THRESHOLD CHANGE ───────────────────────────────────
        const thresholdSlider = document.getElementById("threshold-slider");
        const thresholdDisplay = document.getElementById("threshold-display");
        thresholdSlider.addEventListener("input", () => {
            thresholdDisplay.textContent = parseFloat(thresholdSlider.value).toFixed(2);
        });
        thresholdSlider.addEventListener("change", () => {
            // Reinit observer with new threshold
            resetLab();
        });

        // ─── GLOW OVERRIDE ─────────────────────────────────────
        document.getElementById("glow-override").addEventListener("input", (e) => {
            const val = e.target.value;
            document.querySelectorAll(".santis-ncard.awakened").forEach(card => {
                card.style.setProperty("--glow-intensity", val);
            });
        });

        // ─── RESET ──────────────────────────────────────────────
        window.resetLab = function() {
            // Clear observer
            SantisObserver.fullClear();

            // Reset all cards to dormant
            document.querySelectorAll(".santis-ncard").forEach(card => {
                card.classList.remove("awakened", "selected");
                card.style.removeProperty("--glow-intensity");
            });

            // Clear focus
            document.getElementById("focus-card").style.display = "none";
            _selectedCard = null;

            // Clear event log
            document.getElementById("event-log").innerHTML = "";

            logEvent("🔄 LAB RESET — all systems reinitialized");
            updateDiagnostics();

            // Reinit
            initObserver();

            // Scroll to top
            grid.scrollTo({ top: 0, behavior: "smooth" });
        };

        // ─── EVENT LOG ──────────────────────────────────────────
        function logEvent(msg) {
            const log = document.getElementById("event-log");
            const now = new Date();
            const ts = now.toLocaleTimeString("tr-TR", { hour12: false });

            const entry = document.createElement("div");
            entry.className = "event-entry";
            entry.innerHTML = `<span style="color:var(--text-dim)">[${ts}]</span> ${msg}`;

            log.prepend(entry);

            // Keep max 30 entries (DOM pruning)
            while (log.children.length > 30) {
                log.lastElementChild.remove();
            }
        }

        // ─── DIAGNOSTICS UPDATE ─────────────────────────────────
        function updateDiagnostics() {
            const status = SantisObserver.status();
            document.getElementById("diag-tracked").textContent = status.tracked;
            document.getElementById("diag-pct").textContent =
                Math.round((status.tracked / ENTITIES.length) * 100) + "%";
            document.getElementById("tel-obs").textContent = status.tracked;
        }

        // ─── TELEMETRY: FPS & MEMORY ────────────────────────────
        (function initTelemetry() {
            const fpsEl = document.getElementById("tel-fps");
            const memEl = document.getElementById("tel-mem");
            let frames = 0;
            let lastTime = performance.now();

            function telemetryLoop() {
                const now = performance.now();
                frames++;

                if (now >= lastTime + 1000) {
                    const fps = Math.round((frames * 1000) / (now - lastTime));
                    fpsEl.textContent = fps;
                    fpsEl.style.color = fps >= 55 ? "#50C878" : fps >= 40 ? "#D4AF37" : "#FF3B30";

                    if (performance.memory) {
                        const mb = (performance.memory.usedJSHeapSize / (1024 * 1024)).toFixed(1);
                        memEl.textContent = mb + "MB";
                        memEl.style.color = mb > 100 ? "#FF3B30" : "#D4AF37";
                    } else {
                        memEl.textContent = "N/A";
                    }

                    frames = 0;
                    lastTime = now;
                }
                requestAnimationFrame(telemetryLoop);
            }
            requestAnimationFrame(telemetryLoop);
        })();

        // Periodic diagnostic sync
        setInterval(updateDiagnostics, 1000);

        // ─── BOOT LOG ───────────────────────────────────────────
        logEvent("🦅 SOVEREIGN LAB v12.2 — ONLINE");
        logEvent(`📊 ${ENTITIES.length} entities loaded into grid`);
        
        // ─── PHASE 15 NEURAL PRICING SYNC ───────────────────────
        const surgeSlider = document.getElementById("surge-slider");
        const surgeDisplay = document.getElementById("surge-display");
        
        surgeSlider.addEventListener("input", () => {
            surgeDisplay.textContent = `x${parseFloat(surgeSlider.value).toFixed(2)}`;
        });

        async function fetchCurrentSurge() {
            try {
                const res = await fetch("http://localhost:8080/api/v1/booking/admin/surge", {
                    // Requires Auth in production
                    headers: { "Authorization": "Bearer hq_boardroom_token" }
                });
                if (res.ok) {
                    const data = await res.json();
                    surgeSlider.value = data.surge_multiplier;
                    surgeDisplay.textContent = `x${data.surge_multiplier.toFixed(2)}`;
                    logEvent(`[SYNC] Core Surge Config: x${data.surge_multiplier.toFixed(2)}`, 'blue');
                }
            } catch(e) { console.error("Surge fetch failed", e); }
        }

        window.syncSurgeToCore = async function() {
            const val = parseFloat(surgeSlider.value);
            try {
                const res = await fetch("http://localhost:8080/api/v1/booking/admin/surge", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": "Bearer hq_boardroom_token"
                    },
                    body: JSON.stringify({ surge_multiplier: val })
                });
                if (res.ok) {
                    logEvent(`[OVERRIDE] Surge locked at x${val.toFixed(2)}. Steel Core updated.`);
                    triggerPulse(true); // Fire golden pulse
                } else {
                    logEvent("[ERROR] Surge sync failed", 'red');
                }
            } catch(e) {
                logEvent("[ERROR] Connection to Steel Core severed", 'red');
            }
        };

        // Initialize Phase 15 Module
        fetchCurrentSurge();

    })();
    </script>
</body>
</html>
