<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery Upload • Santis Admin</title>
  <style>
    :root {
      --bg:      #0a0a0b;
      --panel:   #111113;
      --border:  #222226;
      --gold:    #C9A96E;
      --dim:     #666;
      --text:    #ddd;
      --danger:  #B22222;
      --green:   #3d8f5f;
    }
    * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 24px; }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 36px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
    }
    .page-header h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.1em; color: var(--gold); }
    .page-header a { color: var(--dim); font-size: 12px; text-decoration: none; }
    .page-header a:hover { color: var(--gold); }

    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 24px; max-width: 1200px; margin: 0 auto; }

    /* ── Upload Panel ── */
    .upload-panel { background: var(--panel); border: 1px solid var(--border); padding: 28px; }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: 2px; text-align: center;
      padding: 48px 20px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--gold); background: rgba(201,169,110,0.05); }
    .drop-zone .icon { font-size: 32px; margin-bottom: 10px; }
    .drop-zone p { color: var(--dim); font-size: 13px; }
    .drop-zone strong { color: var(--gold); }
    #preview-img {
      max-width: 100%; max-height: 200px; object-fit: cover; display: none;
      margin: 0 auto 20px; border: 1px solid var(--border);
    }

    label { display: block; font-size: 11px; letter-spacing: 0.1em; color: var(--dim);
      text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    input[type=text], select, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; font-size: 13px; border-radius: 2px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--gold); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 24px; font-size: 12px; letter-spacing: 0.12em;
      text-transform: uppercase; cursor: pointer; border: none;
      border-radius: 2px; transition: all 0.2s;
    }
    .btn-primary { background: var(--gold); color: #000; }
    .btn-primary:hover { background: #b5924d; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-sm      { padding: 6px 14px; font-size: 11px; }
    .btn-row     { display: flex; gap: 10px; margin-top: 20px; }

    .status-msg { margin-top: 14px; padding: 10px 14px; border-radius: 2px; font-size: 13px;
      display: none; }
    .status-msg.ok    { background: rgba(61,143,95,0.15); color: #5cb85c; border: 1px solid #3d8f5f55; }
    .status-msg.err   { background: rgba(178,34,34,0.15); color: #e06c6c; border: 1px solid #B2222255; }
    .status-msg.show  { display: block; }

    /* ── Asset Table ── */
    .assets-panel { background: var(--panel); border: 1px solid var(--border); padding: 28px; }
    .assets-panel h2 { font-size: 13px; font-weight: 500; letter-spacing: 0.12em;
      color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 6px 16px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid var(--border); background: transparent; color: var(--dim);
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active, .tab-btn:hover { border-color: var(--gold); color: var(--gold); }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 10px 12px; color: var(--dim); letter-spacing: 0.08em;
      text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 12px; border-bottom: 1px solid #1a1a1e; vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .thumb { width: 56px; height: 40px; object-fit: cover; border: 1px solid var(--border); }
    .cat-badge {
      display: inline-block; padding: 2px 8px; font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; border-radius: 2px;
    }
    .cat-hamam { background: rgba(201,169,110,0.15); color: var(--gold); }
    .cat-masaj { background: rgba(100,149,237,0.15); color: #6495ed; }
    .cat-cilt  { background: rgba(147,112,219,0.15); color: #9370db; }
    .cat-diger { background: rgba(100,100,100,0.15); color: #888; }
    .empty-row td { text-align: center; color: var(--dim); padding: 40px; }
    .surge-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); margin-right: 4px; animation: gold-pulse 2s infinite; }
    @keyframes gold-pulse {
      0%,100% { box-shadow: 0 0 3px rgba(201,169,110,0.4); }
      50%      { box-shadow: 0 0 10px rgba(201,169,110,0.9); }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>⬦ Gallery Asset Command</h1>
  <a href="/admin/index.html">← HQ Dashboard</a>
</div>

<div class="layout">

  <!-- ── Upload Form ───────────────────────────────────── -->
  <div class="upload-panel">
    <div class="drop-zone" id="drop-zone">
      <div class="icon">⬦</div>
      <p>Görseli <strong>buraya sürükle</strong> veya <strong>tıkla</strong></p>
      <p style="font-size:11px; margin-top:6px;">JPG · PNG · WebP · GIF</p>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
    </div>
    <img decoding="async" loading="lazy" id="preview-img" src="" alt="Preview" />

    <label>Kategori</label>
    <select id="sel-category">
      <option value="hamam">Hamam</option>
      <option value="masaj">Masaj</option>
      <option value="cilt">Cilt Bakımı</option>
      <option value="diger">Diğer</option>
    </select>

    <label>Bağlı Hizmet (opsiyonel)</label>
    <select id="sel-service">
      <option value="">— Seçiniz —</option>
    </select>

    <label>Caption (TR)</label>
    <input type="text" id="inp-caption-tr" placeholder="Osmanlı Hamam Ritüeli" />

    <label>Caption (EN)</label>
    <input type="text" id="inp-caption-en" placeholder="Ottoman Hammam Ritual" />

    <label>Caption (DE)</label>
    <input type="text" id="inp-caption-de" placeholder="Osmanisches Hamam-Ritual" />

    <label>Sıralama</label>
    <input type="number" id="inp-sort" value="0" min="0" max="999" style="width:80px" />

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-upload">⬆ Yükle & Yayınla</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- ── Asset Table ───────────────────────────────────── -->
  <div class="assets-panel">
    <h2>Görsel Kütüphanesi <span id="asset-count" style="color:var(--dim);font-weight:300">(—)</span></h2>

    <div class="filter-tabs" id="filter-tabs">
      <button class="tab-btn active" data-cat="all">Tümü</button>
      <button class="tab-btn" data-cat="hamam">Hamam</button>
      <button class="tab-btn" data-cat="masaj">Masaj</button>
      <button class="tab-btn" data-cat="cilt">Cilt</button>
      <button class="tab-btn" data-cat="diger">Diğer</button>
    </div>

    <div id="multiplier-bar" style="margin-bottom:16px;font-size:12px;color:var(--dim);display:none">
      <span class="surge-dot"></span>Live Multiplier: <strong id="mult-val" style="color:var(--gold)">—</strong>
    </div>

    <table>
      <thead>
        <tr>
          <th>Önizleme</th>
          <th>Dosya</th>
          <th>Kategori</th>
          <th>Caption TR</th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody id="asset-tbody">
        <tr class="empty-row"><td colspan="5">Yükleniyor...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
(function () {
  const API = '/api/v1/media';
  let currentCat = 'all';
  let allAssets  = [];

  // ── Load Services ──────────────────────────────────
  fetch('/api/v1/services?tenant_id=santis_hq')
    .then(r => r.json())
    .then(data => {
      const sel = document.getElementById('sel-service');
      const list = Array.isArray(data) ? data : (data.services || []);
      list.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id; opt.textContent = s.name;
        sel.appendChild(opt);
      });
    }).catch(() => {});

  // ── Load Assets ────────────────────────────────────
  async function loadAssets() {
    const res  = await fetch(`${API}/assets?lang=tr`);
    const data = await res.json();
    allAssets  = data.assets || [];
    const mult = data.multiplier || 1.0;

    document.getElementById('asset-count').textContent = `(${allAssets.length})`;
    if (mult > 1.0) {
      document.getElementById('multiplier-bar').style.display = 'block';
      document.getElementById('mult-val').textContent = `${mult.toFixed(2)}×`;
    }
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('asset-tbody');
    const list  = currentCat === 'all' ? allAssets : allAssets.filter(a => a.category === currentCat);
    if (!list.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Görsel yok.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(a => `
      <tr data-id="${a.id}">
        <td><img decoding="async" class="thumb" src="${a.url}" alt fetchpriority="high"></td>
        <td style="font-family:monospace;font-size:11px;color:#666">${a.filename}</td>
        <td><span class="cat-badge cat-${a.category}">${a.category}</span></td>
        <td style="color:#aaa">${a.caption || '—'}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deleteAsset('${a.id}')">✕</button>
        </td>
      </tr>
    `).join('');
  }

  // ── Filter Tabs ────────────────────────────────────
  document.getElementById('filter-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderTable();
  });

  // ── Drop Zone ──────────────────────────────────────
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const previewImg = document.getElementById('preview-img');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) showPreview(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) showPreview(fileInput.files[0]);
  });

  function showPreview(file) {
    fileInput._selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewImg.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  // ── Upload ─────────────────────────────────────────
  document.getElementById('btn-upload').addEventListener('click', async () => {
    const file = fileInput._selectedFile || fileInput.files[0];
    if (!file) { showStatus('Lütfen bir görsel seçin.', 'err'); return; }

    const fd = new FormData();
    fd.append('file',               file);
    fd.append('category',           document.getElementById('sel-category').value);
    fd.append('caption_tr',         document.getElementById('inp-caption-tr').value);
    fd.append('caption_en',         document.getElementById('inp-caption-en').value);
    fd.append('caption_de',         document.getElementById('inp-caption-de').value);
    fd.append('linked_service_id',  document.getElementById('sel-service').value);
    fd.append('sort_order',         document.getElementById('inp-sort').value);

    try {
      document.getElementById('btn-upload').textContent = 'Yükleniyor...';
      const res  = await fetch(`${API}/upload`, { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      showStatus(`✓ Yüklendi: ${data.filename}`, 'ok');
      fileInput._selectedFile = null;
      previewImg.style.display = 'none';
      loadAssets();
    } catch (e) {
      showStatus(`✗ Hata: ${e.message}`, 'err');
    } finally {
      document.getElementById('btn-upload').textContent = '⬆ Yükle & Yayınla';
    }
  });

  // ── Delete ─────────────────────────────────────────
  window.deleteAsset = async (id) => {
    if (!confirm('Bu görseli kaldırmak istediğinize emin misiniz?')) return;
    await fetch(`${API}/assets/${id}`, { method: 'DELETE' });
    loadAssets();
  };

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `status-msg ${type} show`;
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  loadAssets();
})();
</script>
</body>
</html>
