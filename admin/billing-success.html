<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sovereign Upgrade — Santis Master OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; display: block; }

    :root {
      --gold: #d4af37;
      --gold-glow: rgba(212,175,55,0.35);
      --green: #00ff88;
      --bg: #020406;
      --surface: rgba(10,12,16,0.9);
      --border: rgba(255,255,255,0.07);
      --text: #c8cdd8;
      --muted: #444c5c;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,175,55,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(0,255,136,0.05) 0%, transparent 50%);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Particles */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: floatUp 4s ease-in forwards;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      20%  { opacity: 0.8; transform: translateY(-20px) scale(1); }
      100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
    }

    /* Main card */
    .success-card {
      text-align: center;
      max-width: 520px;
      width: 90%;
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Shield icon */
    .shield-wrap {
      width: 100px; height: 100px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.2), transparent 70%);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      animation: shieldPulse 2s ease-in-out infinite;
      box-shadow: 0 0 40px var(--gold-glow);
    }
    @keyframes shieldPulse {
      0%, 100% { box-shadow: 0 0 40px var(--gold-glow); }
      50%       { box-shadow: 0 0 70px var(--gold-glow), 0 0 120px rgba(212,175,55,0.15); }
    }

    .sovereign-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em;
      color: var(--gold); font-weight: 700; font-family: 'JetBrains Mono', monospace;
      margin-bottom: 14px;
      animation: labelFade 1s 0.3s both;
    }
    @keyframes labelFade { from { opacity:0; } to { opacity:1; } }

    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 42px; font-weight: 700;
      color: #fff; line-height: 1.1;
      margin-bottom: 8px;
    }
    .success-title span { color: var(--gold); }

    .success-sub {
      font-size: 16px; color: var(--text); margin-bottom: 36px;
      line-height: 1.6;
    }

    /* Stats strip */
    .stats-strip {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 36px;
    }
    .stat-pill {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      backdrop-filter: blur(12px);
    }
    .stat-pill-val {
      font-size: 20px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
    }
    .stat-pill-lbl {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* Session info */
    .session-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .session-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .session-id {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--green);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 260px;
    }

    /* Buttons */
    .btn-row { display: flex; gap: 12px; justify-content: center; }
    .btn-primary {
      padding: 14px 28px; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; text-decoration: none;
      background: linear-gradient(135deg, var(--gold), #b8941d);
      color: #000; border: none;
      box-shadow: 0 4px 24px var(--gold-glow);
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--gold-glow); }
    .btn-secondary {
      padding: 14px 28px; border-radius: 10px; font-size: 14px;
      font-weight: 500; cursor: pointer; text-decoration: none;
      background: rgba(255,255,255,0.04); color: var(--text);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); }

    /* Live badge */
    .mock-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; color: #f59e0b; font-family: 'JetBrains Mono', monospace;
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 999px; padding: 4px 10px; margin-top: 20px;
    }
    .mock-badge.live { color: var(--green); background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.2); }
  </style>
</head>
<body>

<div class="success-card">
  <div class="shield-wrap">🛡️</div>

  <div class="sovereign-label">Sovereign Armor Acquired</div>

  <h1 class="success-title">Upgrade <span>Başarılı!</span></h1>
  <p class="success-sub" id="success-sub">
    Planınız güncellendi. Santis Master OS, yeni zırhınızla tam güce ulaştı.
  </p>

  <div class="stats-strip" id="stats-strip" style="display:none">
    <div class="stat-pill">
      <div class="stat-pill-val" id="plan-name">—</div>
      <div class="stat-pill-lbl">Aktif Plan</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="plan-bookings">—</div>
      <div class="stat-pill-lbl">Rezervasyon Limiti</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="plan-price">—</div>
      <div class="stat-pill-lbl">Aylık Ücret</div>
    </div>
  </div>

  <div class="session-box">
    <span class="session-lbl">Session ID</span>
    <span class="session-id" id="session-id-display">Yükleniyor...</span>
  </div>

  <div class="btn-row">
    <a href="/admin/black-room.html" class="btn-primary">🦾 Black Room'a Dön</a>
    <a href="/admin/index.html" class="btn-secondary">← Dashboard</a>
  </div>

  <div id="mode-badge"></div>
</div>

<script>
  // ── Read URL params ──────────────────────────────
  const params   = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id') || '—';
  const plan      = params.get('plan') || '';
  const isMock    = params.get('mock') === 'true';

  document.getElementById('session-id-display').textContent = sessionId;

  // Plan data (mirror from saas_billing.py)
  const PLANS = {
    starter:    { name: 'Starter',    bookings: 500,   price: '€49' },
    pro:        { name: 'Pro',        bookings: 9999,  price: '€99' },
    enterprise: { name: 'Enterprise', bookings: 99999, price: '€299' },
  };

  const pd = PLANS[plan];
  if (pd) {
    document.getElementById('plan-name').textContent     = pd.name;
    document.getElementById('plan-bookings').textContent = pd.bookings.toLocaleString();
    document.getElementById('plan-price').textContent    = pd.price + '/ay';
    document.getElementById('stats-strip').style.display = 'flex';
    document.getElementById('success-sub').textContent  =
      `${pd.name} planı aktif edildi. Santis Master OS, yeni zırhınızla tam güce ulaştı.`;
  }

  // Mode badge
  const badge = document.getElementById('mode-badge');
  if (isMock) {
    badge.innerHTML = '<div class="mock-badge">⚡ TEST MODU — Gerçek ödeme yapılmadı</div>';
  } else {
    badge.innerHTML = '<div class="mock-badge live">● Gerçek Ödeme Onaylandı</div>';
  }

  // ── Gold particles ────────────────────────────────
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left  = Math.random() * 100 + 'vw';
    p.style.bottom = Math.random() * 20 + 'px';
    p.style.animationDelay = Math.random() * 2 + 's';
    p.style.animationDuration = (2 + Math.random() * 3) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
  for (let i = 0; i < 30; i++) setTimeout(spawnParticle, i * 150);
</script>
</body>
</html>
