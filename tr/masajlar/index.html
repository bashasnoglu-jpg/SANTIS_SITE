<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Santis Sovereign | Omni-OS V18</title>

    <link rel="preconnect" href="https://cdn.santis.com" crossorigin>
    <link rel="dns-prefetch" href="//cdn.santis.com">

    <link rel="preload" as="image" href="/assets/img/hero/hero-general.webp" fetchpriority="high">

    <link rel="preload" href="/assets/fonts/PlayfairDisplay-Regular.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="modulepreload" href="/assets/js/boot/santis-bootloader.js">

    <style>
        :root { --vanta-black: #050505; --liquid-gold: #d4af37; }
        body { margin: 0; padding: 0; background-color: var(--vanta-black); color: #fff; font-family: 'Playfair Display', serif; overflow-x: hidden; }
        
        /* CLS (Düzen Kayması) önleyici iskeletler */
        .santis-header-ghost { height: 80px; width: 100%; position: absolute; top: 0; z-index: 9999; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .santis-hero-skeleton { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--vanta-black); z-index: 1;}
        .santis-hero-skeleton img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8; z-index: 0; }
        
        /* Worker'ın kartları basacağı Arena (İlk başta karanlıkta) */
        .santis-matrix-container { min-height: 50vh; padding: 4rem 5vw; position: relative; z-index: 2; opacity: 0; transition: opacity 0.8s ease; }
    </style>

    <link rel="preload" href="/assets/css/style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/assets/css/style.css"></noscript>
</head>

<body data-page="massage">

    <canvas id="santis-god-canvas" style="position:fixed; inset:0; width:100vw; height:100vh; pointer-events:none; z-index:0;"></canvas>

    <div class="santis-header-ghost"></div>

    <header class="santis-hero-skeleton">
        <img src="/assets/img/hero/hero-general.webp" alt="Santis Sovereign" fetchpriority="high" decoding="sync" loading="eager">
        <h1 style="z-index: 1; color: var(--liquid-gold); font-size: 3rem; text-shadow: 0 4px 20px rgba(0,0,0,0.8);">V18 Singularity</h1>
    </header>

    <main id="santis-giant-lineup" class="santis-matrix-container"></main>

    <script type="module" src="/assets/js/boot/santis-bootloader.js"></script>

</body>
</html>
