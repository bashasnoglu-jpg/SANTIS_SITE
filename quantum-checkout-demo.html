<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Santis Quantum OS - Sovereign Checkout — Santis Club Spa & Wellness Antalya. Lüks hamam, masaj ve cilt bakımı deneyimleri Konyaaltı'nda.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santis Quantum OS - Sovereign Checkout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        body, html { 
            margin: 0; padding: 0; background: #0a0a09; 
            color: #f5f5f0; font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* 1. LAYOUT: BENTO GRID GHOST ANCHORS */
        .santis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .santis-ritual-anchor {
            aspect-ratio: 3 / 4;
            position: relative;
            overflow: hidden;
            background: #0f0f0c;
            border-radius: 4px; /* Hafif lüks kavis */
            cursor: pointer;
        }

        /* 2. UNIVERSAL GHOST FORGE (Parametrik CSS Karşılığı) */
        .santis-ghost-hybrid {
            position: absolute;
            inset: 0;
            z-index: 2;
            transition: opacity 0.5s ease;
        }

        .santis-ghost-echo {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            transform: scale(1.1);
            opacity: 0.6;
        }

        /* Aura: JavaScript'ten gelen RGB değerleriyle beslenecek CSS değişkenleri kullanıyoruz */
        .santis-forge-aura {
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 20%, rgba(var(--aura-r), var(--aura-g), var(--aura-b), 0.3) 50%, transparent 80%);
            background-size: 200% 100%;
            animation: quantumShimmer var(--aura-speed) infinite linear;
            mix-blend-mode: overlay;
        }

        @keyframes quantumShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Başlıklar Ghost Modundayken de görünsün diye hafif bir iskelet yapısı */
        .ghost-title-placeholder {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            height: 2rem;
            background: rgba(var(--aura-r), var(--aura-g), var(--aura-b), 0.2);
            border-radius: 2px;
            backdrop-filter: blur(5px);
        }

        /* 3. WALLET OVERLAY (The Sovereign Ripple & Portal) */
        
        /* Dokunulan noktadan patlayan dalga */
        .wallet-ripple-overlay {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            transform: scale(0);
            opacity: 0.8;
            z-index: 9998;
            /* Performans dostu: blur yok, sadece scale ve opacity */
            animation: sovereignRipple 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes sovereignRipple {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* Tüm ekranı saran, API çağrısını gizleyen Lüks Portal */
        .wallet-bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: radial-gradient(circle at center, rgba(var(--aura-r), var(--aura-g), var(--aura-b), 0.15) 0%, rgba(10,10,9,0.95) 80%);
            opacity: 0;
            transition: opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .wallet-bg-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .portal-text {
            color: rgb(var(--aura-r), var(--aura-g), var(--aura-b));
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s 0.2s ease;
        }

        .wallet-bg-overlay.active .portal-text {
            opacity: 1;
            transform: translateY(0);
            animation: textBreathe 2s infinite ease-in-out 0.5s;
        }

        @keyframes textBreathe {
            0%, 100% { letter-spacing: 5px; opacity: 0.7; }
            50% { letter-spacing: 8px; opacity: 1; text-shadow: 0 0 10px rgba(var(--aura-r), var(--aura-g), var(--aura-b), 0.5); }
        }

        /* Mock Apple Pay Modal */
        .apple-pay-mock {
            width: 300px;
            height: 400px;
            background: #fff;
            border-radius: 20px;
            position: absolute;
            bottom: -500px;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .wallet-bg-overlay.show-wallet .apple-pay-mock {
            bottom: 2rem;
        }

        .apple-pay-mock img {
            width: 60px;
            margin-bottom: 2rem;
            margin-top: 2rem;
        }

        .pay-amount {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .pay-item {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }
        
        .face-id-mock {
            margin-top: auto;
            width: 40px;
            height: 40px;
            border: 2px solid #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .face-id-mock::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: #32d74b;
            top: 0;
            animation: scan 1.5s infinite linear;
        }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .header {
            text-align: center;
            padding: 4rem 2rem 1rem;
        }
        .header h1 {
            font-weight: 300;
            letter-spacing: -1px;
            font-size: 2.5rem;
            margin: 0;
        }
        .header p {
            color: #a0a09a;
            margin-top: 1rem;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Sovereign Ritual Matrix</h1>
        <p>Ghost Facade üzerinden Apple Pay'e tünel açın (Single-Click Checkout).</p>
    </div>

    <!-- 📍 THE BENTO GRID -->
    <div class="santis-grid" id="ritual_grid">
        <!-- JS tarafından doldurulacak -->
    </div>

    <!-- 🌌 THE WALLET OVERLAY (Portal) -->
    <div class="wallet-bg-overlay" id="wallet_portal">
        <!-- Ripple buraya JS ile eklenecek -->
        
        <!-- Apple Pay Mock UI -->
        <div class="apple-pay-mock" id="apple_pay_ui">
            <!-- Basit bir SVGA Apple Logosu yerine siyah yuvarlak koyalım -->
            <div style="width:50px; height:50px; background:#000; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size: 1.2rem; font-weight: bold; margin-bottom: 2rem; margin-top:2rem;">Pay</div>
            <div class="pay-amount" id="pay_price">€250.00</div>
            <div class="pay-item" id="pay_title">Kraliyet Osmanlı Hamamı</div>
            <div class="pay-item" style="color: #999; font-size: 0.8rem; margin-top:0.5rem;">SANTIS SPA & WELLNESS</div>
            
            <div class="face-id-mock"></div>
            <div style="font-size:0.7rem; color:#666; margin-top:0.5rem; text-transform:uppercase; letter-spacing:1px;">Confirm with Face ID</div>
        </div>
        
        <div class="portal-text" id="portal_text">Securing Your Ritual...</div>
    </div>

    <script>
        /**
         * SANTIS QUANTUM OS - PHASE 4: CHECKOUT SIMULATOR
         */

        // 1. UNIVERSAL GHOST FORGE: Ritüel Matrisi
        const SovereignRitualMatrix = {
            "ottoman_core": {
                title: "Kraliyet Osmanlı Hamamı",
                price: "€250.00",
                img: "https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=400&blur=200",
                auraConfig: {
                    r: 212, g: 175, b: 55, // #D4AF37 Santis Gold
                    speed: "3s"
                }
            },
            "aurelia_trance": {
                title: "Bütünsel Duygu Masajı",
                price: "€320.00",
                img: "https://images.unsplash.com/photo-1600334129128-68505018659d?q=80&w=400&blur=200",
                auraConfig: {
                    r: 229, g: 195, b: 91, // #E5C35B Deep Amber
                    speed: "2s"
                }
            },
            "deep_tension": {
                title: "Derin Gerilim Terapisi",
                price: "€180.00",
                img: "https://images.unsplash.com/photo-1519824145371-296894a0daa9?q=80&w=400&blur=200",
                auraConfig: {
                    r: 100, g: 100, b: 100, // Obsidian Mist (Grimsi)
                    speed: "1.5s"
                }
            }
        };

        const grid = document.getElementById('ritual_grid');

        // 2. DOM ENJEKSİYONU (Webflow'un yaptığı işlemi simüle eder)
        function injectGhosts() {
            Object.keys(SovereignRitualMatrix).forEach(key => {
                const ritual = SovereignRitualMatrix[key];
                
                const anchor = document.createElement('div');
                anchor.className = 'santis-ritual-anchor';
                anchor.dataset.santisGhost = key;
                // Parametrik CSS Değişkenlerini ata
                anchor.style.setProperty('--aura-r', ritual.auraConfig.r);
                anchor.style.setProperty('--aura-g', ritual.auraConfig.g);
                anchor.style.setProperty('--aura-b', ritual.auraConfig.b);
                anchor.style.setProperty('--aura-speed', ritual.auraConfig.speed);

                anchor.innerHTML = `
                    <div class="santis-ghost-hybrid">
                        <div class="santis-ghost-echo" style="background-image: url('${ritual.img}')"></div>
                        <div class="santis-forge-aura"></div>
                        <div class="ghost-title-placeholder"></div>
                    </div>
                `;

                // Tıklama Dinleyicisi (Omni-Bridge Görevi)
                anchor.addEventListener('click', (e) => handlePhantomClick(e, key, ritual));

                grid.appendChild(anchor);
            });
        }

        // 3. OMNI-BRIDGE & WALLET KOREOGRAFİSİ
        const portal = document.getElementById('wallet_portal');
        const portalText = document.getElementById('portal_text');
        const applePayUI = document.getElementById('apple_pay_ui');
        
        function handlePhantomClick(e, ghostId, ritualConfig) {
            console.log(`[Omni-Bridge] Tıklama yakalandı: ${ghostId}`);

            // A. Sovereign Ripple Efekti (Dokunulan yerden başlar)
            const rect = portal.getBoundingClientRect();
            // Tıklama koordinatları (viewport'a göre)
            const clickX = e.clientX;
            const clickY = e.clientY;

            const ripple = document.createElement('div');
            ripple.className = 'wallet-ripple-overlay';
            // Tıklanan yere ortala
            ripple.style.left = clickX + 'px';
            ripple.style.top = clickY + 'px';
            
            // Çapı hesapla (ekranın en uzak köşesine ulaşacak kadar büyük)
            const maxDimension = Math.max(window.innerWidth, window.innerHeight);
            ripple.style.width = maxDimension + 'px';
            ripple.style.height = maxDimension + 'px';
            ripple.style.marginLeft = -(maxDimension/2) + 'px';
            ripple.style.marginTop = -(maxDimension/2) + 'px';
            
            // Renk Ghost'un renginden gelir
            ripple.style.background = `radial-gradient(circle, rgba(${ritualConfig.auraConfig.r}, ${ritualConfig.auraConfig.g}, ${ritualConfig.auraConfig.b}, 0.8) 0%, transparent 60%)`;

            document.body.appendChild(ripple);

            // B. Portal Arka Planını Aktifleştir ve CSS Değişkenlerini ata
            portal.style.setProperty('--aura-r', ritualConfig.auraConfig.r);
            portal.style.setProperty('--aura-g', ritualConfig.auraConfig.g);
            portal.style.setProperty('--aura-b', ritualConfig.auraConfig.b);
            
            portal.classList.add('active');
            
            // Modal Verilerini Doldur
            document.getElementById('pay_price').innerText = ritualConfig.price;
            document.getElementById('pay_title').innerText = ritualConfig.title;

            // Arka planda Shopify Checkout API Çağrısı Simülasyonu
            console.log("[Sovereign Checkout] Shopify API'ye tünel açılıyor...");
            portalText.innerText = "Securing Your Ritual...";

            setTimeout(() => {
                // API Başarılı. Apple Pay Modalını Fırlat.
                portalText.style.opacity = "0"; // Metni gizle
                portal.classList.add('show-wallet');
                
                // Başarı Simulasyonu (Face ID Onayı)
                setTimeout(() => {
                    const scanUI = document.querySelector('.face-id-mock');
                    scanUI.style.borderColor = "#32d74b";
                    scanUI.innerHTML = '<svg fill="#32d74b" viewBox="0 0 24 24" width="24" height="24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>';
                    scanUI.style.animation = 'none';
                    
                    // İşlem tamam, her şeyi kapat
                    setTimeout(() => {
                        portal.classList.remove('show-wallet');
                        portal.classList.remove('active');
                        ripple.remove();
                        // Apple pay mock'u sıfırla
                        setTimeout(() => {
                            portalText.style.opacity = "1";
                            scanUI.style.borderColor = "#000";
                            scanUI.innerHTML = "";
                        }, 500);
                        console.log("[Sovereign Checkout] Ödeme Tamamlandı.");
                    }, 1500);
                }, 2000);

            }, 800); // 800ms Ağ Gecikmesi Simülasyonu
        }

        // Sistemi Başlat
        window.onload = () => {
            injectGhosts();
            console.log("[Santis OS] Sovereign Matrix Yüklendi.");
        };

    </script>
</body>
</html>
