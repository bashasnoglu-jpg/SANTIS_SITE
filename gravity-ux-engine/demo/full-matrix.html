<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UX Gravity Engine v3 | The Full Matrix</title>
    <style>
        body { margin: 0; background: #030305; color: #fff; font-family: monospace; overflow: hidden; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .panel { 
            background: rgba(10,10,15,0.9); border: 1px solid rgba(0,229,255,0.4); 
            padding: 20px; border-radius: 8px; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            width: 320px;
        }
        .cyan { color: #00e5ff; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;}
        .gold { color: #c5a059; } .pink { color: #ff3366; } .gray { color: #888; }
        .stat-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; border-bottom: 1px solid #222; padding-bottom: 5px;}
        .fps-badge { font-size: 2.2rem; color: #00ff66; font-weight: bold; text-align: center; margin-top:15px; text-shadow: 0 0 15px rgba(0,255,102,0.4); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel">
            <div class="cyan">UX GRAVITY ENGINE v3</div>
            <div style="color:#888; font-size: 0.65rem; margin-top: 5px;">O(n) SPATIAL HASH GRID & SoA MEMORY</div>
            
            <div class="stat-row" style="margin-top:20px;"><span class="gray">AKTİF BOT (MÜŞTERİ):</span> <span class="pink" id="bot-count">--</span></div>
            <div class="stat-row"><span class="gray">ÜRÜN KARTI (GRID):</span> <span class="gold" id="card-count">--</span></div>
            <div class="stat-row"><span class="gray">İŞLEMCİ ÇEKİRDEĞİ:</span> <span class="cyan" id="core-count">--</span></div>
            
            <div class="fps-badge"><span id="fps">0</span> FPS</div>
            <div style="font-size:0.65rem; color:#888; text-align:center; margin-top:5px;">Spatial Hash ile Saniyede <span id="ops" class="cyan">0</span> Milyon İşlem Optimize Edildi</div>
        </div>
    </div>
    <canvas id="cvs"></canvas>

    <script>
        const Engine = (() => {
            const canvas = document.getElementById('cvs');
            const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
            let w, h;
            
            // --- 1. DONANIM GÜCÜNÜ ALGILAMA ---
            const cores = navigator.hardwareConcurrency || 4;
            const BOT_COUNT = cores * 5000; // 8 Çekirdek = 40.000 Bot
            const CARD_COUNT = 150; // Devasa E-Ticaret Mağaza Izgarası
            const CELL_SIZE = 200; // Spatial Hash Hücre Boyutu
            
            document.getElementById('bot-count').innerText = BOT_COUNT.toLocaleString();
            document.getElementById('card-count').innerText = CARD_COUNT;
            document.getElementById('core-count').innerText = cores;

            // --- 2. DATA-ORIENTED DESIGN (SoA BELLEK MİMARİSİ) ---
            const bots = {
                x: new Float32Array(BOT_COUNT),
                y: new Float32Array(BOT_COUNT),
                vx: new Float32Array(BOT_COUNT),
                vy: new Float32Array(BOT_COUNT),
                type: new Uint8Array(BOT_COUNT)
            };

            const cards = [];
            const spatialGrid = new Map();

            const resize = () => { 
                w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; 
                initCards();
            };
            window.addEventListener('resize', resize);

            const initCards = () => {
                cards.length = 0;
                spatialGrid.clear();
                
                let cols = Math.floor((w - 100) / 80);
                let startX = (w - (cols * 80)) / 2;
                
                for(let i=0; i<CARD_COUNT; i++) {
                    let col = i % cols;
                    let row = Math.floor(i / cols);
                    
                    let card = {
                        x: startX + col * 80 + (Math.random()*20-10),
                        y: 100 + row * 80 + (Math.random()*20-10),
                        mass: Math.random() * 1.2 + 0.5,
                        isApex: Math.random() > 0.90
                    };
                    if (card.isApex) card.mass *= 2.0;
                    cards.push(card);

                    let cx = Math.floor(card.x / CELL_SIZE);
                    let cy = Math.floor(card.y / CELL_SIZE);
                    for(let x = -1; x <= 1; x++) {
                        for(let y = -1; y <= 1; y++) {
                            let key = `${cx+x},${cy+y}`;
                            if(!spatialGrid.has(key)) spatialGrid.set(key, []);
                            spatialGrid.get(key).push(card);
                        }
                    }
                }
            };

            const initBots = () => {
                for(let i=0; i<BOT_COUNT; i++) {
                    bots.x[i] = Math.random() * w;
                    bots.y[i] = Math.random() * -h * 2; 
                    bots.vx[i] = 0;
                    bots.vy[i] = Math.random() * 3 + 1;
                    let r = Math.random();
                    bots.type[i] = r > 0.85 ? 1 : (r > 0.6 ? 2 : 0);
                }
            };

            let frames = 0, lastTime = performance.now();

            const loop = () => {
                ctx.fillStyle = 'rgba(3, 3, 5, 0.4)';
                ctx.fillRect(0, 0, w, h);

                ctx.lineWidth = 1.5;
                for(let i=0; i<CARD_COUNT; i++) {
                    let c = cards[i];
                    ctx.beginPath();
                    ctx.arc(c.x, c.y, c.mass * 8, 0, Math.PI * 2);
                    ctx.strokeStyle = c.isApex ? '#c5a059' : 'rgba(0, 229, 255, 0.15)';
                    if(c.isApex) { ctx.fillStyle = 'rgba(197, 160, 89, 0.1)'; ctx.fill(); }
                    ctx.stroke();
                }

                for(let i=0; i<BOT_COUNT; i++) {
                    if (bots.y[i] > h + 50 || bots.x[i] < -50 || bots.x[i] > w + 50) {
                        bots.y[i] = Math.random() * -500;
                        bots.x[i] = Math.random() * w;
                        bots.vy[i] = Math.random() * 3 + 1;
                        bots.vx[i] = 0;
                    }

                    let key = `${Math.floor(bots.x[i] / CELL_SIZE)},${Math.floor(bots.y[i] / CELL_SIZE)}`;
                    let nearbyCards = spatialGrid.get(key);

                    if (nearbyCards) {
                        let maxPull = 0, tdx = 0, tdy = 0;

                        for(let j=0; j<nearbyCards.length; j++) {
                            let c = nearbyCards[j];
                            if (bots.type[i] === 1 && !c.isApex) continue;

                            let dx = c.x - bots.x[i];
                            let dy = c.y - bots.y[i];
                            let distSq = dx*dx + dy*dy;
                            
                            if (distSq < 25000) {
                                let pull = (c.mass * 2000) / (distSq + 100);
                                if (bots.type[i] === 2) pull *= 2.0;
                                
                                if (pull > maxPull) {
                                    maxPull = pull; tdx = dx; tdy = dy;
                                }
                            }
                        }
                        if (maxPull > 0) {
                            bots.vx[i] += tdx * maxPull * 0.005;
                            bots.vy[i] += tdy * maxPull * 0.005;
                        }
                    }

                    if (bots.type[i] === 0) bots.vx[i] += 0.05;

                    bots.vx[i] *= 0.94;
                    bots.vy[i] *= 0.94;
                    bots.x[i] += bots.vx[i];
                    bots.y[i] += bots.vy[i];

                    ctx.fillStyle = bots.type[i] === 1 ? '#c5a059' : (bots.type[i] === 2 ? '#ff3366' : '#00e5ff');
                    ctx.fillRect(bots.x[i], bots.y[i], 1.5, 1.5);
                }

                frames++;
                const now = performance.now();
                if(now - lastTime >= 1000) {
                    document.getElementById('fps').innerText = frames;
                    let classicOps = (BOT_COUNT * CARD_COUNT) / 1000000;
                    document.getElementById('ops').innerText = classicOps.toFixed(1);
                    frames = 0; lastTime = now;
                }

                requestAnimationFrame(loop);
            };

            return { init: () => { resize(); initBots(); loop(); } };
        })();
        
        Engine.init();
    </script>
</body>
</html>
