# SANTIS MASTER OS — Docker Compose Production Cluster
# Servisler: nginx + api + postgres + redis

version: "3.9"

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Nginx — Wildcard SSL + Reverse Proxy
  # ────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: santis_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    networks:
      - santis_net

  # ────────────────────────────────────────────────────────────────────────────
  # API — FastAPI + Uvicorn (4 workers)
  # ────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: santis_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql+asyncpg://santis:${DB_PASSWORD}@postgres:5432/santis_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./assets/img:/app/assets/img
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - santis_net
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 — Production veritabanı
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: santis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: santis_db
      POSTGRES_USER: santis
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - santis_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U santis -d santis_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Redis — Tenant Resolution Cache + Session
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: santis_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - santis_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Certbot — Let's Encrypt Wildcard SSL otomasyonu
  # ────────────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: santis_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'
    networks:
      - santis_net

# ────────────────────────────────────────────────────────────────────────────
# Volumes & Networks
# ────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  santis_net:
    driver: bridge
