<!-- SOVEREIGN STYLE GLOBAL NAV (QUIET LUXURY) -->
<style>
  /* Sovereign - Quiet Luxury Navbar */
  #nv-main-nav.sovereign-nav {
    height: 85px; /* Daha geniş, ferah ve otantik bir lüks için 85px yükseklik */
    background: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0 5%;
    transition: background 0.4s ease, height 0.4s ease;
    z-index: 1000;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
  }
  
  /* Kaydırma sırasında hafif blur (Glassmorphism) */
  #nv-main-nav.sovereign-nav.navbar--scrolled {
    height: 70px;
    background: rgba(10, 10, 10, 0.92);
    -webkit-backdrop-filter: blur(25px);
    backdrop-filter: blur(25px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sovereign-nav-container {
    width: 100%;
    max-width: 1800px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    font-family: 'Inter', sans-serif;
  }

  /* --- LEFT: LOGO --- */
  .sovereign-logo {
    color: #e5e5e5;
    opacity: 0.9;
    transition: opacity 0.3s, transform 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }
  .sovereign-logo:hover { opacity: 1; transform: scale(1.05); }

  /* --- CENTER: LINKS --- */
  .sovereign-links {
    display: flex;
    gap: clamp(15px, 2vw, 35px);
    list-style: none;
    margin: 0;
    padding: 0;
    align-items: center;
    justify-content: center;
    height: 100%;
  }

  .sovereign-link-item {
    font-size: 13px; /* 11px'den büyütüldü */
    font-weight: 600;
    letter-spacing: 0.08em; /* Harf aralığı biraz kısıldı ki çok dağılmasın */
    text-transform: uppercase;
    color: #cccccc;
    text-decoration: none;
    transition: color 0.4s ease, opacity 0.4s ease;
    cursor: pointer;
    position: relative;
    padding-bottom: 4px;
  }
  
  .sovereign-link-item:hover, .sovereign-link-item.active {
    color: #D4AF37; /* Santis Gold */
    opacity: 1;
  }

  /* Alt Çizgi Vurgusu */
  .sovereign-link-item::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 1px;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    background-color: #D4AF37;
    transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .sovereign-link-item:hover::after, .sovereign-link-item.active::after {
    width: 100%;
  }

  /* --- RIGHT: ACTIONS --- */
  .sovereign-actions {
    display: flex;
    align-items: center;
    gap: clamp(12px, 1.5vw, 22px);
    justify-content: flex-end;
  }

  /* Rituals Cta */
  .sovereign-rituals-cta {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .sovereign-rituals-cta span.dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: #D4AF37;
    opacity: 0.8;
  }
  .sovereign-rituals-cta:hover span.dot {
    animation: pulse-dot 1s infinite alternate;
  }
  .sovereign-rituals-cta span.text {
    font-size: 12px; /* 10px'den büyütüldü */
    text-transform: uppercase;
    letter-spacing: 0.1em; /* Okunaklılık için 0.25'ten düşürüldü */
    color: #D4AF37;
    font-weight: 700;
    transition: color 0.3s ease;
  }
  .sovereign-rituals-cta:hover span.text {
    color: #ffffff;
  }

  @keyframes pulse-dot {
    from { transform: scale(1); opacity: 0.8; }
    to { transform: scale(1.5); opacity: 1; }
  }

  .nav-divider {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.15);
  }

  .btn-rezervasyon {
    font-size: 12px; /* 11px'den büyütüldü */
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em; /* 0.15'ten 0.1em yapıldı */
    color: #D4AF37;
    transition: color 0.3s ease;
  }
  .btn-rezervasyon:hover {
    color: #fff;
  }

  /* Mid-width harmony: keep center links aligned when actions get wider */
  @media (max-width: 1536px) {
    .sovereign-links {
      gap: clamp(8px, 1.2vw, 16px);
    }
    .sovereign-link-item {
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .sovereign-actions {
      gap: clamp(10px, 1.5vw, 15px);
    }
    .sovereign-rituals-cta .text {
      display: none;
    }
    .sovereign-rituals-cta {
      gap: 6px;
    }
  }

  /* --- RESPONSIVE HIDING WITHOUT TAILWIND --- */
  @media (max-width: 1024px) {
    .sovereign-links { display: none; }
    .sovereign-rituals-cta { display: none; }
    .nav-divider { display: none; }
  }
  @media (max-width: 768px) {
    .btn-rezervasyon { display: none; }
    .sovereign-actions { gap: 15px; }
  }

  /* Apple Liquid Mega Menu Fiziği */
  :root {
      --apple-dropdown-ease: cubic-bezier(0.32, 0.72, 0, 1);
  }

  .santis-liquid-menu-container {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      overflow: hidden;
      transform-origin: top;
      transform: scaleY(0);
      opacity: 0;
      z-index: 999; /* Nav'ın hemen altında */
      transition: transform 0.5s var(--apple-dropdown-ease), opacity 0.4s ease;
  }
  .santis-liquid-menu-container.active {
      transform: scaleY(1);
      opacity: 1;
  }

  #liquid-menu-content {
      opacity: 0;
      transition: opacity 0.3s ease;
  }
  #liquid-menu-content.reveal {
      opacity: 1;
      transition-delay: 0.1s;
  }

  #liquid-nav-overlay {
      position: absolute;
      inset: 0;
      top: 100%;
      height: 100vh;
      background: rgba(5, 5, 5, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
  }
  #liquid-nav-overlay.active {
      opacity: 1;
      pointer-events: auto;
  }

  /* Liquid Menu İçerik Stilleri (JS ile Basılan) */
  .liquid-menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 5%;
  }
  .liquid-col-title {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
  }
  .liquid-link {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: #fff;
      text-decoration: none;
      transition: color 0.3s ease;
      display: block;
      margin-bottom: 1rem;
  }
  .liquid-link:hover {
      color: #D4AF37;
  }
  .liquid-sublink {
      font-size: 0.875rem;
      color: #aaa;
      text-decoration: none;
      transition: color 0.3s ease;
      display: block;
      margin-bottom: 0.75rem;
  }
  .liquid-sublink:hover {
      color: #fff;
  }
</style>
